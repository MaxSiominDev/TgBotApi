services:
  telegram-bot-api:
    image: ${IMAGE}
    restart: unless-stopped
    env_file: .env.api
    volumes:
      - ./data:/data

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      - DOMAIN=${DOMAIN}
      - BOT_SERVER_IP=${BOT_SERVER_IP}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
